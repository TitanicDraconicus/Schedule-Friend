<!DOCTYPE html>
<html lang="en-us">
<head>
    <title>Study Buddy</title>
    <meta name="viewport" content="width=device-width" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style/main.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="html"><p></p></div>
    <div id="buttons"></div>

    <div id="main" style="display:none"> 

        <!-- ============ NAVIGATION BAR ============ -->
        <nav id="navbar">
            <div id="logo">Study Buddy</div>
            <div id="nav-links">
                <span id="user-display"></span>
                <button class="nav-button" onclick="showAbout()">About Us</button>
                <button class="nav-button" id="auth-button" onclick="showLogin()">Login / Signup</button>                
            </div>
        </nav>

        <!-- ============ LOGIN MODEL (Hidden by Default) ============ -->
        <div id="login-model" class="model">
            <div class="model-content">
                <span class="close" onclick="closeLogin()">&times;</span>
                <h2>Login or Sign Up</h2>
                <form id="authForm">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                    <input type="password" id="confirm-password" placeholder="Confirm Password" style="display: none;">
                    <button type="submit" id="login-btn">Login</button>
                    <button id="signup-btn" onclick="signup()">Sign Up</button>
                </form>
                <!-- sign up error msgs -->
                <p id="usernameError" style="color: red; display: none;">Username already exists.</p>
                <p id="passwordError" style="color: red; display: none;">Passwords do not match.</p>

            </div>
        </div>

        <!-- ============ START MENU SCREEN ============ -->
        <div id="main-menu">
            <style>
                .menu_title {font-size:600%; position: absolute; z-index: -100;  width: 100%; top:14%; margin: 20px; }
            </style>        
            
            <style>
                .menu_buttoons {position: absolute; z-index: 100;  width: 100%; top:44%; margin: 20px; }
            </style>
                
            <h1 class="menu_buttoons">
                <!--<button id="but_start" onclick="showSelectionScreen();" style="font-size:50px">Options</button> -->
            </h1>
        </div>
        
        <!-- ============ MENU SCREEN (Hidden By Default) ============ -->
        <div id="selection-screen" class="model">
            <h2 class="selection-title">Choose an option</h2>
            <span class="close-menu" onclick="closeMenu()">&times;</span>

            <style>
                .selection-box-1 {position: absolute; z-index: 100;  width: 100%; top:1%; left:0%; margin: 20px; }
                .selection-box-2 {position: absolute; z-index: 100;  width: 100%; top:1%; left:25%; margin: 20px; }
                .selection-box-3 {position: absolute; z-index: 100;  width: 100%; top:1%; left:50%; margin: 20px; }
                .selection-box-4 {position: absolute; z-index: 100;  width: 100%; top:1%; left:75%; margin: 20px; }
            </style>
            
        </div>
        
    </div> 



        <!-- ============ JS Scripts Used ============ -->
    <script src="js/signup.js"></script>
    <script src="js/login.js"></script>

    <script type="text/javascript">






//:::::::::::::::::::::::::::=     >------JAVASCRIPT CODE STARTS HERE------<     =:::::::::::::::::::::::::::\\
  


//===================Minimal POST Request====================== 
        fetch('http://localhost:8080/app_users', { //making a fetch request to pull all the users
            method: 'POST', //we have to declare the POST method to use it. A POST creates a new instance, while a PUT request changes whats there
            headers: { 
                'Content-Type': 'application/json' //declaring content type as json
            },
            body: JSON.stringify({ //this is setting up the JSON we want to pass
                userName: 'Frodo_Baggins', //this sets up the user's userName
                password: 'Shire', //setting password, NOT SECURE JUST A TEST
                style: 'BodyBuilding' //setting user style
            })
        })
        .then(response => response.json())  //this handles the Promise returned by fetch(). Response is the HTTP response object returned from the server, response.json is a method that reads the response body and parses it as JSON. It also returns a Promise with the parsed data
        //.then(data => console.log(data)); //This .then recieves the resolved value from the previous Promise (Previous JSON data). datam is the actual Javascript object parsed from the JSON response. Console.log(data) simply outputs the data to the console.



//===================VARIABLES====================== 
        const canvas = document.querySelector("canvas");
        const context = canvas.getContext('2d');






//===================WEBSITE FUNCTIONS====================== 

        website = async () => {
            resize();
            $('#main').show();
            $('#login-model').hide();
            $('#selection-screen').hide();
            console.log("FUNCTION: website() /IS RUNNING")
        }

        //show the selection screen
        showSelectionScreen = () => {
            $('#main-menu').hide(); // Hide main menu
            $('#selection-screen').fadeIn(300); // Smoothly show selection screen
            console.log("FUNCTION: showSelectionScreen() / IS RUNNING");
        }

        showAbout = () => {
            /*add show about page stuff*/
        }

        //show login/signup popup
        showLogin = () => {
            document.getElementById("login-model").style.display = "flex";
            document.getElementById("confirm-password").style.display = "none";
            document.getElementById("confirm-password").value = "";
        }

        //close login popup
        closeLogin = () => {
            document.getElementById("login-model").style.display = "none";
        }

        //close menu popup
        closeMenu = () => {
            $('#selection-screen').fadeOut(300); // Smoothly show selection screen
            $('#main-menu').fadeIn(300); // Hide main menu
        }


        //Resizes canvas to accomidate window size changes
        resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);


        //ALL IMPORTANT FUNCTION: Calls all necissary functions
        fn = () => {
            resize();
            website();
        }

//===================MAIN====================== 
        if (document.readyState !== 'loading'){
            fn();
        }
        else
            document.addEventListener('DOMContentLoaded', fn);


//===================================================
    function showEndScreen() {
        document.getElementById("end-screen").style.display = "flex";
    }

    function goHome() {
        location.reload(); // This reloads and goes back to index.html start screen
    }
    </script>

<!-- ============= HOME SCREEN BUTTON AFTER COMPLETED OPTION =============-->
    <div id="end-screen" style="display:none;">
        <div id="end-screen-content">
            <button id="home-button" onclick="goHome()">Home Screen</button>
        </div>
    </div>

</body>
</html>
